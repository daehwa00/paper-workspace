    <style>.project-thumbnail-wrap{width:min(100%,190px);height:auto;aspect-ratio:612 / 792;justify-content:flex-start;background:#f2f4f7}.project-thumbnail{display:block;width:100%;height:100%;max-width:100%;object-fit:contain;object-position:left center}.hub-topbar{justify-content:flex-start;gap:10px}.hub-home{position:relative;display:grid;flex:0 0 72px;width:72px;height:96px;place-items:center;margin-top:-4px;border:0;border-radius:0;background:transparent;transition:transform .15s,filter .15s}.hub-home:hover,.hub-home:focus-visible{filter:brightness(1.16);outline:0;transform:translateY(-1px) rotate(-2deg)}.hub-home img{display:block;width:96px;height:96px;object-fit:contain;transform:translate(-4px,-14px)}.hub-topbar>div{min-width:0}.hub-avatar{width:30px;height:30px;margin-left:auto;padding:0;border:0;border-radius:50%;background:#2457d6;color:#fff;font-size:11px;font-weight:800;box-shadow:0 0 0 3px #ffffff16;cursor:pointer}.hub-avatar:hover,.hub-avatar:focus-visible{outline:2px solid #84adff;outline-offset:2px}.name-dialog{border:0;border-radius:16px;padding:0;width:min(390px,calc(100vw - 40px));box-shadow:0 20px 60px #10182866}.name-dialog::backdrop{background:#10182888;backdrop-filter:blur(3px)}.name-dialog form{padding:28px}.name-dialog h2{margin:7px 0 6px;font-size:20px}.name-dialog p{margin:0 0 20px;color:#667085;font-size:13px}.name-dialog input[type=text]{box-sizing:border-box;width:100%;border:1px solid #b2ccff;border-radius:9px;padding:12px;font:15px inherit;outline:0}.profile-colors{margin:18px 0 0;padding:0;border:0}.profile-colors legend{margin-bottom:10px;color:#475467;font-size:12px;font-weight:700}.color-options{display:flex;gap:10px}.color-option{position:relative;display:grid;place-items:center;cursor:pointer}.color-option input{position:absolute;width:1px;height:1px;opacity:0}.color-swatch{width:28px;height:28px;border:3px solid #fff;border-radius:50%;background:var(--profile-color);box-shadow:0 0 0 1px #d0d5dd}.color-option input:checked+.color-swatch{box-shadow:0 0 0 2px #101828}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px}.dialog-actions button{padding:10px 15px;border:1px solid #d0d5dd;border-radius:8px;background:#fff;color:#475467;font-weight:700}.dialog-actions .primary{border-color:#2457d6;background:#2457d6;color:#fff}</style>
  </head>
  <body>
    <header class="hub-topbar"><a class="hub-home" href="/" title="논문 허브 홈" aria-label="논문 허브 홈"><img src="/assets/desk-doodle.png?v=3" alt="논문 허브" /></a><div><p class="eyebrow">연구실 논문 관리</p><h1>논문 작업공간</h1></div><span class="hub-toolbar"><button class="theme-trigger" type="button" title="화면 모드 설정" aria-label="화면 모드 설정" aria-haspopup="dialog"><svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></svg><svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.2A8.5 8.5 0 0 1 8.8 4a8.5 8.5 0 1 0 11.2 11.2Z"/></svg></button><button id="hub-collab-name" class="hub-avatar" type="button" title="표시 이름 변경" aria-label="표시 이름 변경" hidden>나</button></span></header>
    <main class="hub-main">
      <section class="hub-intro"><div><p class="eyebrow blue">프로젝트</p><h2>작업할 논문을 선택하세요</h2><p>논문마다 편집 내용, 협업 커서, PDF 렌더링, 백업이 분리됩니다.</p></div><div class="hub-project-tools"><label class="search"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></svg><input id="project-search" type="search" placeholder="논문 검색" aria-label="논문 검색" /></label><label class="project-sort-label"><span class="sr-only">논문 정렬</span><select id="project-sort" aria-label="논문 정렬"><option value="recent">최근 작업순</option><option value="name">이름순</option><option value="comments">댓글 있는 논문 우선</option></select><svg viewBox="0 0 20 20" aria-hidden="true"><path d="m6 8 4 4 4-4"/></svg></label></div></section>
      <section id="project-list" class="project-grid" aria-live="polite" aria-busy="true"><div class="project-skeleton" aria-hidden="true"><span></span><i></i><b></b><em></em></div><div class="project-skeleton" aria-hidden="true"><span></span><i></i><b></b><em></em></div><div class="project-skeleton" aria-hidden="true"><span></span><i></i><b></b><em></em></div><span class="sr-only">프로젝트 목록을 불러오는 중입니다.</span></section>
    </main>
    <dialog id="hub-name-dialog" class="name-dialog"><form method="dialog"><span class="eyebrow blue">COLLABORATION</span><h2>표시 이름 설정</h2><p>공동 편집자에게 보이는 이름과 프로필 색상입니다.</p><input id="hub-name-input" type="text" maxlength="32" autocomplete="name" /><fieldset class="profile-colors"><legend>프로필 색상</legend><div class="color-options"><label class="color-option" title="파랑"><input type="radio" name="hub-profile-color" value="#2457d6"><span class="color-swatch" style="--profile-color:#2457d6"></span></label><label class="color-option" title="보라"><input type="radio" name="hub-profile-color" value="#7c3aed"><span class="color-swatch" style="--profile-color:#7c3aed"></span></label><label class="color-option" title="청록"><input type="radio" name="hub-profile-color" value="#0891b2"><span class="color-swatch" style="--profile-color:#0891b2"></span></label><label class="color-option" title="초록"><input type="radio" name="hub-profile-color" value="#059669"><span class="color-swatch" style="--profile-color:#059669"></span></label><label class="color-option" title="주황"><input type="radio" name="hub-profile-color" value="#d97706"><span class="color-swatch" style="--profile-color:#d97706"></span></label><label class="color-option" title="빨강"><input type="radio" name="hub-profile-color" value="#dc2626"><span class="color-swatch" style="--profile-color:#dc2626"></span></label><label class="color-option" title="분홍"><input type="radio" name="hub-profile-color" value="#db2777"><span class="color-swatch" style="--profile-color:#db2777"></span></label></div></fieldset><div class="dialog-actions"><button value="cancel">취소</button><button value="confirm" class="primary">저장</button></div></form></dialog>
    <dialog class="theme-dialog"><form method="dialog"><span class="eyebrow blue">APPEARANCE</span><h2>화면 모드</h2><p>이 브라우저의 허브와 모든 논문에 함께 적용됩니다.</p><fieldset class="theme-options" aria-label="화면 모드"><label><input type="radio" name="workspace-theme" value="system"><span><strong>시스템</strong><small>기기 설정에 맞춰 자동 전환</small></span></label><label><input type="radio" name="workspace-theme" value="light"><span><strong>라이트</strong><small>밝은 작업 화면을 항상 사용</small></span></label><label><input type="radio" name="workspace-theme" value="dark"><span><strong>다크</strong><small>어두운 작업 화면을 항상 사용</small></span></label></fieldset><div class="dialog-actions"><button value="close" class="primary">완료</button></div></form></dialog>
    <script src="/hub.js?v=__HUB_JS_HASH__"></script>
    <script src="/theme.js?v=__THEME_JS_HASH__"></script>
  </body>
</html>
