<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Paper Workspace example project</title>
  <desc id="desc">A fictional paper workspace showing a project tree, LaTeX editor, PDF preview, and research assistant.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#111b31"/><stop offset="1" stop-color="#1c3158"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17233d" flood-opacity=".13"/>
    </filter>
    <style>
      .ui{font-family:DejaVu-Sans;fill:#1d2a43}
      .mono{font-family:DejaVu-Sans-Mono;fill:#26354d}
      .muted{fill:#74819a}.small{font-size:14px}.label{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect width="1440" height="900" fill="#eef2f7"/>
  <rect width="1440" height="68" fill="url(#header)"/>
  <text x="32" y="42" class="ui" fill="#fff" font-size="22" font-weight="800">Paper Workspace</text>
  <circle cx="322" cy="34" r="6" fill="#55d6a6"/>
  <text x="360" y="42" class="ui" fill="#d8e1f2" font-size="15">Example project · saved locally</text>
  <text x="1115" y="42" class="ui" fill="#c9d4e8" font-size="15">Synced 2.1s ago</text>
  <rect x="1290" y="17" width="105" height="34" rx="8" fill="#2e62df"/>
  <text x="1342" y="39" class="ui" fill="#fff" font-size="15" text-anchor="middle" font-weight="700">Download PDF</text>

  <rect x="0" y="68" width="246" height="832" fill="#fff"/>
  <rect x="246" y="68" width="586" height="832" fill="#fbfcfe"/>
  <rect x="832" y="68" width="608" height="832" fill="#f1f4f8"/>
  <line x1="246" y1="68" x2="246" y2="900" stroke="#d9e0ea"/>
  <line x1="832" y1="68" x2="832" y2="900" stroke="#d9e0ea"/>

  <text x="28" y="110" class="ui" font-size="14" font-weight="800">PROJECT FILES</text>
  <rect x="28" y="132" width="190" height="40" rx="9" fill="#edf3ff"/>
  <text x="51" y="158" class="ui" font-size="16" font-weight="800">⌄  paper</text>
  <text x="74" y="202" class="ui" font-size="15">▸  drafts</text>
  <text x="74" y="240" class="ui" font-size="15">▸  figures</text>
  <rect x="28" y="263" width="190" height="39" rx="8" fill="#edf3ff"/>
  <text x="49" y="289" class="ui" font-size="15" fill="#2e62df" font-weight="700">▤  main.tex</text>
  <text x="49" y="333" class="ui" font-size="15">▤  references.bib</text>
  <text x="49" y="377" class="ui" font-size="15">▤  project.json</text>
  <line x1="28" y1="413" x2="218" y2="413" stroke="#e3e8f0"/>
  <text x="28" y="449" class="ui" font-size="13" font-weight="700" fill="#7d8aa0">DROP FILES OR FOLDERS HERE</text>
  <rect x="28" y="469" width="190" height="76" rx="10" fill="#fafbfe" stroke="#b9c7dc" stroke-dasharray="5 5"/>
  <text x="123" y="501" class="ui" text-anchor="middle" font-size="14" fill="#62718b">Upload supporting</text>
  <text x="123" y="523" class="ui" text-anchor="middle" font-size="14" fill="#62718b">materials</text>

  <rect x="246" y="68" width="586" height="49" fill="#fff"/>
  <text x="274" y="99" class="ui" font-size="14" font-weight="800">paper/main.tex</text>
  <text x="733" y="99" class="ui" font-size="13" fill="#72809a">Auto-saved</text>
  <line x1="246" y1="117" x2="832" y2="117" stroke="#d9e0ea"/>
  <rect x="246" y="117" width="586" height="783" fill="#fbfcfe"/>
  <text x="276" y="153" class="mono" font-size="16">\documentclass{article}</text>
  <text x="276" y="180" class="mono" font-size="16">\usepackage{graphicx}</text>
  <text x="276" y="207" class="mono" font-size="16">\usepackage{natbib}</text>
  <text x="276" y="252" class="mono" font-size="16">\title{A Reusable Paper Workspace}</text>
  <text x="276" y="279" class="mono" font-size="16">\author{Your Name}</text>
  <text x="276" y="326" class="mono" font-size="16">\begin{document}</text>
  <text x="276" y="353" class="mono" font-size="16">\maketitle</text>
  <text x="276" y="400" class="mono" font-size="16">\begin{abstract}</text>
  <rect x="268" y="414" width="514" height="74" rx="6" fill="#e7f0ff"/>
  <text x="286" y="441" class="mono" font-size="16">Replace this text with a concise summary</text>
  <text x="286" y="467" class="mono" font-size="16">of the problem, method, and evidence.</text>
  <text x="276" y="516" class="mono" font-size="16">\end{abstract}</text>
  <text x="276" y="563" class="mono" font-size="16">\section{Introduction}</text>
  <text x="276" y="590" class="mono" font-size="16">Describe the research problem and cite</text>
  <text x="276" y="617" class="mono" font-size="16">only sources present in the bibliography.</text>
  <text x="276" y="664" class="mono" font-size="16">\section{Method}</text>
  <text x="276" y="691" class="mono" font-size="16">Explain the method precisely enough to</text>
  <text x="276" y="718" class="mono" font-size="16">make the work reproducible.</text>
  <text x="276" y="765" class="mono" font-size="16">\section{Experiments}</text>
  <text x="276" y="792" class="mono" font-size="16">Report metrics, uncertainty, and caveats.</text>

  <rect x="832" y="68" width="608" height="49" fill="#fff"/>
  <text x="860" y="99" class="ui" font-size="14" font-weight="800">PDF PREVIEW</text>
  <text x="1273" y="99" class="ui" font-size="13" fill="#72809a">Live render</text>
  <line x1="832" y1="117" x2="1440" y2="117" stroke="#d9e0ea"/>
  <rect x="872" y="145" width="422" height="625" rx="2" fill="#fff" filter="url(#shadow)"/>
  <text x="1083" y="193" class="ui" text-anchor="middle" font-size="18" font-weight="800">A Reusable Paper Workspace</text>
  <text x="1083" y="219" class="ui muted" text-anchor="middle" font-size="12">Your Name</text>
  <line x1="918" y1="247" x2="1248" y2="247" stroke="#d8dee8"/>
  <text x="918" y="278" class="ui" font-size="15" font-weight="800">Abstract</text>
  <text x="918" y="302" class="ui" font-size="11">Replace this text with a concise summary of the</text>
  <text x="918" y="321" class="ui" font-size="11">problem, method, and evidence.</text>
  <text x="918" y="365" class="ui" font-size="15" font-weight="800">1. Introduction</text>
  <text x="918" y="388" class="ui" font-size="11">Describe the research problem and cite only sources</text>
  <text x="918" y="407" class="ui" font-size="11">present in the bibliography.</text>
  <text x="918" y="451" class="ui" font-size="15" font-weight="800">2. Method</text>
  <text x="918" y="474" class="ui" font-size="11">Explain the method precisely enough to reproduce it.</text>
  <text x="918" y="518" class="ui" font-size="15" font-weight="800">3. Experiments</text>
  <text x="918" y="541" class="ui" font-size="11">Report metrics, uncertainty, and caveats.</text>
  <line x1="918" y1="570" x2="1248" y2="570" stroke="#d8dee8"/>
  <text x="918" y="603" class="ui" font-size="10">References</text>
  <text x="918" y="625" class="ui" font-size="10">Lamport, L. 1994. LaTeX: A Document Preparation System.</text>

  <rect x="1180" y="710" width="222" height="130" rx="14" fill="#fff" stroke="#d8e2f7" filter="url(#shadow)"/>
  <circle cx="1210" cy="744" r="15" fill="#5c6ee8"/><text x="1210" y="749" class="ui" fill="#fff" text-anchor="middle" font-size="12" font-weight="800">AI</text>
  <text x="1237" y="749" class="ui" font-size="13" font-weight="800">Paper assistant</text>
  <text x="1202" y="779" class="ui muted" font-size="11">Select a sentence to request</text>
  <text x="1202" y="797" class="ui muted" font-size="11">a comment or revision.</text>
  <rect x="1202" y="812" width="104" height="18" rx="7" fill="#edf3ff"/><text x="1254" y="825" class="ui" text-anchor="middle" font-size="10" fill="#2e62df" font-weight="700">Ask Codex</text>
</svg>
