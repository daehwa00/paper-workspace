name: paper-workspace
services:
  codex-bridge:
    build:
      context: ../..
      dockerfile: apps/paper_workspace/codex_bridge/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CODEX_WORKSPACE: /workspace/project
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ${CODEX_AUTH_FILE:-${HOME}/.codex/auth.json}:/run/secrets/codex-auth:ro
      - ${PAPER_PROJECT_DIR:-../../examples/paper-workspace-project}:/workspace/project:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
      - /home/node/.codex:size=32m,nosuid,nodev,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000},mode=0700
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 128
    cpus: 2
    restart: unless-stopped
  collaboration:
    build:
      context: ../..
      dockerfile: apps/paper_workspace/collaboration/Dockerfile
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
  compiler:
    build:
      context: ../..
      dockerfile: apps/paper_workspace/compiler/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 128
    cpus: 2
    restart: unless-stopped
  workspace:
    build:
      context: ../..
      dockerfile: infra/paper-workspace/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    read_only: true
    volumes:
      - ${PAPER_PROJECT_DIR:-../../examples/paper-workspace-project}:/usr/share/nginx/html/project:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
      - /var/cache/nginx:size=16m,noexec,nosuid,nodev
      - /var/run:size=1m,noexec,nosuid,nodev
    restart: unless-stopped
  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      codex-bridge:
        condition: service_started
      collaboration:
        condition: service_started
      compiler:
        condition: service_started
      workspace:
        condition: service_healthy
    environment:
      PAPER_DOMAIN: ${PAPER_DOMAIN:-localhost}
    env_file:
      - path: .env
        required: false
    ports:
      - "${PAPER_BIND_ADDRESS:-127.0.0.1}:80:80"
      - "${PAPER_BIND_ADDRESS:-127.0.0.1}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
volumes:
  caddy_data:
  caddy_config:
