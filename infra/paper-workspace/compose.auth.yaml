services:
  backup:
    environment:
      BACKUP_ACTOR_MODE: proxy
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    env_file:
      - path: .env.auth
        required: true
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --upstream=static://202
      - --reverse-proxy=true
      - --trusted-proxy-ip=${PAPER_AUTH_NETWORK_CIDR:-172.30.6.0/24}
      - --set-xauthrequest=true
      - --pass-user-headers=true
      - --skip-provider-button=true
      - --cookie-secure=true
      - --cookie-httponly=true
      - --cookie-samesite=lax
      - --scope=openid email profile
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails
    volumes:
      - ./.auth/allowed-emails:/etc/oauth2-proxy/allowed-emails:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - auth_internal
    restart: unless-stopped
  caddy:
    depends_on:
      oauth2-proxy:
        condition: service_started
    command: ["caddy", "run", "--config", "/etc/paper-caddy/Caddyfile.auth", "--adapter", "caddyfile"]
    networks:
      - auth_internal
