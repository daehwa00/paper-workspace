server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    location = /__client_error {
        access_log off;
        log_not_found off;
        client_max_body_size 2k;
        client_body_buffer_size 2k;
        if ($request_method != POST) { return 405; }
        if ($content_type != "application/json") { return 415; }
        return 204;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /hub.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location = /assets/paper-workspace.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~ ^/(hub(?:-ux)?\.css|hub\.js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~ ^/(app\.css|components\.css|ux\.css|app\.js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location = /bootstrap.js {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location /vendor/ {
        types { text/javascript js mjs; }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location /project-runtime/ { internal; }
    location /project/ { try_files /project-runtime$uri =404; }
    location ~ "^/projects/([A-Za-z0-9][A-Za-z0-9_-]{0,63})/thumbnail\.png$" {
        add_header Cache-Control "public, no-cache" always;
        try_files /project-runtime$uri /generated-thumbnails/$1/thumbnail.png =404;
    }
    location ~ ^/projects/.*\.(?:png|jpe?g|webp|pdf|eps)$ {
        add_header Cache-Control "private, max-age=300" always;
        try_files /project-runtime$uri =404;
    }
    location /projects/ { try_files /project-runtime$uri =404; }
    location / { try_files $uri $uri/ /index.html; }
}
