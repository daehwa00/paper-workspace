server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /hub.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location ~ ^/(hub(?:-ux)?\.css|hub\.js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~ ^/(app\.css|components\.css|ux\.css|app\.js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location /vendor/ {
        types { text/javascript js mjs; }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location /project/ { try_files $uri =404; }
    location ~ ^/projects/.*\.(?:png|jpe?g|webp|pdf|eps)$ {
        add_header Cache-Control "private, max-age=300" always;
        try_files $uri =404;
    }
    location /projects/ { try_files $uri =404; }
    location / { try_files $uri $uri/ /index.html; }
}
