services:
  password-gate:
    build:
      context: ../..
      dockerfile: apps/paper_workspace/password_gate/Dockerfile
    env_file:
      - path: .env.password
        required: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    pids_limit: 32
    cpus: 0.25
    restart: unless-stopped
  caddy:
    depends_on:
      password-gate:
        condition: service_started
    volumes:
      - ./Caddyfile.password:/etc/caddy/Caddyfile:ro
