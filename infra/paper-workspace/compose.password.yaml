services:
  backup:
    environment:
      BACKUP_ACTOR_MODE: display
  password-gate:
    build:
      context: ../..
      dockerfile: apps/paper_workspace/password_gate/Dockerfile
    env_file:
      - path: .env.password
        required: true
    environment:
      PAPER_TRUSTED_PROXY_CIDRS: ${PAPER_AUTH_NETWORK_CIDR:-172.30.6.0/24}
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    pids_limit: 32
    cpus: 0.25
    networks:
      - auth_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8079/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
  caddy:
    depends_on:
      password-gate:
        condition: service_healthy
    command: ["caddy", "run", "--config", "/etc/paper-caddy/Caddyfile.password", "--adapter", "caddyfile"]
    networks:
      - auth_internal
